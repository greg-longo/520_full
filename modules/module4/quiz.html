<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Module 4 Quiz - DTSC 520</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Zilla+Slab:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0e0d;
      --bg-card: #1a1815;
      --bg-card2: #2a2824;
      --accent: #b07030;
      --accent-light: #c88840;
      --text-primary: #f5f5f5;
      --text-secondary: #b8b8b8;
      --correct-bg: #4a9e6b;
      --correct-text: #7ecfa0;
      --wrong-bg: #b04040;
      --wrong-text: #e08080;
      --border: #3a3835;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: 'Zilla Slab', serif;
      font-size: 16px;
      line-height: 1.6;
    }

    /* NAVIGATION */
    nav {
      position: sticky;
      top: 0;
      background-color: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }

    .nav-breadcrumb {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .nav-breadcrumb a {
      color: var(--accent);
      text-decoration: none;
    }

    .nav-breadcrumb a:hover {
      color: var(--accent-light);
    }

    .nav-back {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      color: var(--accent);
      text-decoration: none;
    }

    .nav-back:hover {
      color: var(--accent-light);
    }

    /* MAIN CONTAINER */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 40px 20px;
      min-height: 100vh;
    }

    /* LANDING SCREEN */
    #screen-landing {
      text-align: center;
    }

    .module-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text-primary);
    }

    .quiz-description {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 24px;
      line-height: 1.8;
    }

    .quiz-note {
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      padding: 16px;
      margin-bottom: 32px;
      text-align: left;
      font-size: 14px;
      color: var(--text-secondary);
    }

    button {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      font-weight: 600;
      background-color: var(--accent);
      color: var(--bg);
      border: none;
      padding: 12px 24px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-radius: 4px;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: var(--accent-light);
    }

    /* QUESTION SCREEN */
    #screen-question {
      display: none;
    }

    .progress-container {
      margin-bottom: 32px;
    }

    .progress-bar {
      background-color: var(--bg-card);
      height: 4px;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-fill {
      background-color: var(--accent);
      height: 100%;
      width: 0%;
      transition: width 0.3s ease;
    }

    .progress-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
      text-align: right;
    }

    .question-card {
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      padding: 32px;
      border-radius: 6px;
    }

    .question-eyebrow {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .question-text {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 24px;
      color: var(--text-primary);
      line-height: 1.5;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .option-btn {
      background-color: var(--bg-card2);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 16px;
      text-align: left;
      font-size: 15px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
      font-family: 'Zilla Slab', serif;
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--accent);
      background-color: rgba(176, 112, 48, 0.1);
    }

    .option-btn:disabled {
      cursor: not-allowed;
    }

    .option-btn.correct {
      background-color: rgba(74, 158, 107, 0.15);
      border-color: var(--correct-bg);
    }

    .option-btn.wrong {
      background-color: rgba(176, 64, 64, 0.15);
      border-color: var(--wrong-bg);
    }

    .feedback {
      font-size: 14px;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 24px;
      display: none;
    }

    .feedback.show {
      display: block;
    }

    .feedback.correct {
      background-color: rgba(74, 158, 107, 0.1);
      border: 1px solid var(--correct-bg);
      color: var(--correct-text);
    }

    .feedback.wrong {
      background-color: rgba(176, 64, 64, 0.1);
      border: 1px solid var(--wrong-bg);
      color: var(--wrong-text);
    }

    .next-btn-container {
      display: none;
      text-align: right;
      margin-top: 24px;
    }

    .next-btn-container.show {
      display: block;
    }

    /* RESULTS SCREEN */
    #screen-results {
      display: none;
      text-align: center;
    }

    .score-number {
      font-size: 80px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .score-details {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }

    .results-breakdown {
      text-align: left;
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      padding: 24px;
      border-radius: 6px;
      margin-bottom: 32px;
    }

    .breakdown-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-primary);
    }

    .breakdown-item {
      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    .breakdown-item:last-child {
      border-bottom: none;
    }

    .breakdown-item-icon {
      flex-shrink: 0;
      font-size: 16px;
      font-weight: 700;
    }

    .breakdown-item-icon.correct {
      color: var(--correct-text);
    }

    .breakdown-item-icon.wrong {
      color: var(--wrong-text);
    }

    .breakdown-item-text {
      flex: 1;
    }

    .breakdown-item-number {
      font-family: 'IBM Plex Mono', monospace;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .results-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      justify-content: center;
    }

    .results-back-link {
      display: inline-block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      color: var(--accent);
      text-decoration: none;
      margin-top: 12px;
    }

    .results-back-link:hover {
      color: var(--accent-light);
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-breadcrumb">
      <a href="index.html">Course Home</a> > <a href="#">Module 4</a> > Quiz
    </div>
    <a href="index.html" class="nav-back">← Back to Module</a>
  </nav>

  <main>
    <!-- LANDING SCREEN -->
    <div id="screen-landing">
      <div class="module-badge">Module 04 - Pandas</div>
      <h1>Module 4 Quiz</h1>
      <p class="quiz-description">Ten questions covering pandas Series, DataFrames, selection, filtering, cleaning, and aggregation.</p>
      <div class="quiz-note">
        <strong>Note:</strong> Questions appear one at a time. You cannot go back to previous questions once answered.
      </div>
      <button onclick="beginQuiz()">Begin Quiz</button>
    </div>

    <!-- QUESTION SCREEN -->
    <div id="screen-question">
      <div class="progress-container">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText"></div>
      </div>

      <div class="question-card">
        <div class="question-eyebrow" id="questionNumber"></div>
        <div class="question-text" id="questionText"></div>
        <div class="options-container" id="optionsContainer"></div>
        <div class="feedback" id="feedback"></div>
        <div class="next-btn-container" id="nextBtnContainer">
          <button id="nextBtn" onclick="nextQuestion()">Next →</button>
        </div>
      </div>
    </div>

    <!-- RESULTS SCREEN -->
    <div id="screen-results">
      <div class="score-number" id="scoreNumber"></div>
      <div class="score-details" id="scoreDetails"></div>
      <div class="results-breakdown" id="resultsBreakdown"></div>
      <div class="results-actions">
        <button onclick="retake()">Retake Quiz</button>
        <a href="index.html" class="results-back-link">← Back to Module</a>
      </div>
    </div>
  </main>

  <script>
    const allQuestions = [
      // --- SERIES ---
      {
        text: "What is the key difference between a pandas Series and a DataFrame?",
        options: [
          "A Series can only hold strings; a DataFrame can hold any type.",
          "A Series is 1-dimensional with a single index; a DataFrame is 2-dimensional with both a row index and column labels.",
          "A DataFrame is faster than a Series for all operations.",
          "A Series always has an integer index; a DataFrame can have string labels."
        ],
        correctIndex: 1,
        difficulty: "easy",
        feedbackCorrect: "Correct. A Series is 1D - one column of values with an index. A DataFrame is 2D - rows and columns.",
        feedbackWrong: "Not quite. The key distinction is dimensions. A Series is 1D. A DataFrame is 2D. Every DataFrame column is a Series."
      },
      {
        text: "You create s = pd.Series([14400, 19200, 760000]). What is s[1]?",
        options: ["14400", "19200", "760000", "Error - Series uses labels, not integer positions"],
        correctIndex: 1,
        difficulty: "easy",
        feedbackCorrect: "Correct. With a default integer index, s[1] accesses the second element: 19200.",
        feedbackWrong: "Not quite. A Series created from a list gets a default integer index (0, 1, 2). s[1] returns the element at index 1: 19200."
      },
      {
        text: "How do you create a Series with a custom string index?",
        options: [
          "pd.Series([1, 2, 3], labels=['a', 'b', 'c'])",
          "pd.Series([1, 2, 3], index=['a', 'b', 'c'])",
          "pd.Series({'a': 1, 'b': 2}, labels=True)",
          "pd.Series([1, 2, 3]).set_labels(['a', 'b', 'c'])"
        ],
        correctIndex: 1,
        difficulty: "easy",
        feedbackCorrect: "Correct. The index= parameter sets custom labels when creating a Series.",
        feedbackWrong: "Not quite. Use pd.Series(data, index=[...]) to set a custom index. You can also pass a dictionary directly."
      },
      {
        text: "Given s = pd.Series([10, 20, 30], index=['a', 'b', 'c']), what does s['b'] return?",
        options: ["10", "20", "30", "Error"],
        correctIndex: 1,
        difficulty: "easy",
        feedbackCorrect: "Correct. With a string index, you access elements by label. 'b' maps to the second value, 20.",
        feedbackWrong: "Not quite. s['b'] uses label-based access. Index 'b' corresponds to the second element, 20."
      },
      {
        text: "s = pd.Series([10, 20, None, 40]). What does s.isna() return?",
        options: [
          "[False, False, False, False]",
          "[False, False, True, False]",
          "[10, 20, NaN, 40]",
          "Error - None is not allowed in a Series"
        ],
        correctIndex: 1,
        difficulty: "easy",
        feedbackCorrect: "Correct. isna() returns a boolean Series: True where values are NaN/None, False elsewhere.",
        feedbackWrong: "Not quite. isna() returns a boolean mask. None is stored as NaN in pandas, so position 2 is True and the rest are False."
      },
      {
        text: "What does s * 2 do for s = pd.Series([1, 2, 3])?",
        options: [
          "Appends the Series to itself: [1, 2, 3, 1, 2, 3]",
          "Returns a new Series [2, 4, 6] - element-wise multiplication",
          "Error - arithmetic operators don't work on Series",
          "Returns a scalar: the sum doubled"
        ],
        correctIndex: 1,
        difficulty: "easy",
        feedbackCorrect: "Correct. Arithmetic on a Series is element-wise, returning a new Series. s * 2 gives [2, 4, 6].",
        feedbackWrong: "Not quite. Pandas Series support vectorized arithmetic. s * 2 multiplies every element by 2."
      },
      // --- DATAFRAMES ---
      {
        text: "You want to inspect the data types of every column in df. Which command is correct?",
        options: ["df.types()", "df.info(types=True)", "df.dtypes", "df.schema()"],
        correctIndex: 2,
        difficulty: "easy",
        feedbackCorrect: "Correct. df.dtypes is an attribute (not a method call) that returns the dtype of each column.",
        feedbackWrong: "Not quite. df.dtypes is the correct attribute. df.types() and df.schema() do not exist. df.info() prints a summary but dtypes is the direct attribute."
      },
      {
        text: "Which method shows the first 5 rows of a DataFrame?",
        options: ["df.first()", "df.head()", "df.top(5)", "df.rows(5)"],
        correctIndex: 1,
        difficulty: "easy",
        feedbackCorrect: "Correct. df.head() returns the first 5 rows by default. Pass a number like df.head(10) for more.",
        feedbackWrong: "Not quite. df.head() is the correct method. df.first() and df.top() don't exist. df.tail() shows the last rows."
      },
      {
        text: "What does df.describe() return?",
        options: [
          "The column names and dtypes",
          "A summary table with count, mean, std, min, quartiles, and max for each numeric column",
          "The number of rows and columns",
          "A list of all missing values"
        ],
        correctIndex: 1,
        difficulty: "easy",
        feedbackCorrect: "Correct. describe() computes descriptive statistics for numeric columns: count, mean, std, min, 25%, 50%, 75%, max.",
        feedbackWrong: "Not quite. df.describe() gives descriptive stats. df.shape gives dimensions. df.info() gives dtypes and nulls. df.dtypes gives column types."
      },
      {
        text: "How do you create a DataFrame from a dictionary?",
        options: [
          "pd.DataFrame.from_dict({'col1': [1, 2], 'col2': [3, 4]})",
          "pd.DataFrame({'col1': [1, 2], 'col2': [3, 4]})",
          "pd.Series({'col1': [1, 2], 'col2': [3, 4]})",
          "pd.Table({'col1': [1, 2], 'col2': [3, 4]})"
        ],
        correctIndex: 1,
        difficulty: "easy",
        feedbackCorrect: "Correct. pd.DataFrame(dict) is the most common construction method. Keys become column names, values (lists) become column data.",
        feedbackWrong: "Not quite. pd.DataFrame({'col': [values]}) constructs from a dictionary. Keys are column names."
      },
      {
        text: "What does df.shape return for a DataFrame with 100 rows and 5 columns?",
        options: ["500", "(5, 100)", "(100, 5)", "[100, 5]"],
        correctIndex: 2,
        difficulty: "easy",
        feedbackCorrect: "Correct. df.shape returns a tuple of (rows, columns). Always rows first.",
        feedbackWrong: "Not quite. shape returns (rows, columns) as a tuple. For 100 rows and 5 columns: (100, 5)."
      },
      // --- SELECTION ---
      {
        text: "What does df.loc[2, 'avg'] return?",
        options: [
          "The value in the row with label 2 and the column named 'avg'.",
          "The value in the 2nd column and the row named 'avg'.",
          "The 2nd element of 'avg' regardless of index.",
          "A new DataFrame with 2 rows from 'avg'."
        ],
        correctIndex: 0,
        difficulty: "medium",
        feedbackCorrect: "Correct. .loc[] is label-based. df.loc[2, 'avg'] finds the row with index label 2 and returns the 'avg' value.",
        feedbackWrong: "Not quite. .loc[] uses labels. df.loc[2, 'avg'] = row label 2, column 'avg'. For position use .iloc[]."
      },
      {
        text: "What is the difference between df.loc and df.iloc?",
        options: [
          "loc is for columns, iloc is for rows",
          "loc uses label-based indexing; iloc uses integer position-based indexing",
          "iloc is faster than loc for all operations",
          "loc returns a Series; iloc returns a DataFrame"
        ],
        correctIndex: 1,
        difficulty: "medium",
        feedbackCorrect: "Correct. loc uses labels (index values and column names). iloc uses integer positions (0, 1, 2...).",
        feedbackWrong: "Not quite. loc = label-based (use actual index values and column names). iloc = integer position (0-based, like a NumPy array)."
      },
      {
        text: "df.iloc[0, 2] returns which element?",
        options: [
          "The row with label 0 and column named '2'",
          "The element in the first row and third column (position-based)",
          "The element in the third row and first column",
          "Error - iloc requires slices, not integers"
        ],
        correctIndex: 1,
        difficulty: "medium",
        feedbackCorrect: "Correct. iloc is position-based. iloc[0, 2] = first row (position 0), third column (position 2).",
        feedbackWrong: "Not quite. iloc uses integer positions. [0, 2] means row position 0 (first row) and column position 2 (third column)."
      },
      {
        text: "How do you select just the 'avg' column from df as a Series?",
        options: ["df.avg", "df['avg']", "df.loc['avg']", "df.select('avg')"],
        correctIndex: 1,
        difficulty: "easy",
        feedbackCorrect: "Correct. df['column_name'] is the standard way to select a column as a Series. Dot notation also works but fails for names with spaces.",
        feedbackWrong: "Not quite. df['avg'] is the safe, standard approach. Dot notation (df.avg) also works but fails for column names with spaces or that match DataFrame methods."
      },
      {
        text: "How do you select the columns 'name' and 'avg' from df as a DataFrame?",
        options: [
          "df['name', 'avg']",
          "df[['name', 'avg']]",
          "df.select(['name', 'avg'])",
          "df.loc['name', 'avg']"
        ],
        correctIndex: 1,
        difficulty: "medium",
        feedbackCorrect: "Correct. Passing a list of column names inside double brackets returns a DataFrame with those columns.",
        feedbackWrong: "Not quite. To select multiple columns: df[['col1', 'col2']] - a list inside the outer brackets."
      },
      // --- FILTERING ---
      {
        text: "You want all rows where salary > 50000 AND avg > .300. Which expression is correct?",
        options: [
          "df[df['salary'] > 50000 and df['avg'] > .300]",
          "df[df['salary'] > 50000 && df['avg'] > .300]",
          "df.filter(salary > 50000, avg > .300)",
          "df[(df['salary'] > 50000) & (df['avg'] > .300)]"
        ],
        correctIndex: 3,
        difficulty: "medium",
        feedbackCorrect: "Correct. Use & (not 'and'), wrap each condition in parentheses, and use bracket filtering.",
        feedbackWrong: "Not quite. For combining conditions in pandas: use & (not 'and'), wrap each condition in parentheses. df[(cond1) & (cond2)] is correct."
      },
      {
        text: "How do you filter for rows where position is either 'OF' or '1B'?",
        options: [
          "df[df['position'] == 'OF' or df['position'] == '1B']",
          "df[df['position'] in ['OF', '1B']]",
          "df[df['position'].isin(['OF', '1B'])]",
          "df.filter(position=['OF', '1B'])"
        ],
        correctIndex: 2,
        difficulty: "medium",
        feedbackCorrect: "Correct. .isin() checks membership in a list and returns a boolean Series for filtering.",
        feedbackWrong: "Not quite. .isin(['OF', '1B']) is the pandas way to check if values belong to a set. 'in' and 'or' don't work element-wise."
      },
      {
        text: "You want rows where avg is NOT missing. Which is correct?",
        options: [
          "df[df['avg'] != None]",
          "df[df['avg'].notnull()]",
          "df.dropna(column='avg')",
          "df[df['avg'] != NaN]"
        ],
        correctIndex: 1,
        difficulty: "medium",
        feedbackCorrect: "Correct. .notnull() returns True where values are not NaN. Also valid: df[df['avg'].notna()] or ~df['avg'].isna().",
        feedbackWrong: "Not quite. In pandas, use .notnull() or .notna(). Comparing with != None or != NaN does not work correctly for missing values."
      },
      // --- CLEANING ---
      {
        text: "A salary column contains the string 'N/A' in some rows and loads as object dtype. What is the correct approach?",
        options: [
          "Use df['salary'].to_numeric().",
          "Replace the 'N/A' strings with NaN, then cast: df['salary'].replace('N/A', np.nan).astype(float).",
          "Drop the column because it cannot be converted.",
          "Use df['salary'].astype(int) - pandas handles strings automatically."
        ],
        correctIndex: 1,
        difficulty: "medium",
        feedbackCorrect: "Correct. You need to handle the string 'N/A' before casting. Replace first, then convert.",
        feedbackWrong: "Not quite. .to_numeric() is a function (pd.to_numeric()), not a method. .astype(int) raises an error on string values."
      },
      {
        text: "What does df.isna().sum() compute?",
        options: [
          "The total number of rows in the DataFrame.",
          "Whether any column has at least one missing value (True/False per column).",
          "The count of missing values in each column.",
          "The sum of all numeric columns after removing NaNs."
        ],
        correctIndex: 2,
        difficulty: "easy",
        feedbackCorrect: "Correct. df.isna() returns a boolean DataFrame. .sum() counts True values per column = missing value counts.",
        feedbackWrong: "Not quite. df.isna() creates a boolean mask. .sum() on booleans counts True values, giving missing counts per column."
      },
      {
        text: "You call df.dropna(). What happens to the original DataFrame?",
        options: [
          "Nothing - dropna() returns a new DataFrame. The original is unchanged unless you reassign.",
          "The original is modified in place.",
          "Missing values are filled with 0 in the original.",
          "An error is raised unless you pass inplace=True."
        ],
        correctIndex: 0,
        difficulty: "medium",
        feedbackCorrect: "Correct. Pandas methods generally return new objects. To persist: df = df.dropna() or pass inplace=True.",
        feedbackWrong: "Not quite. dropna() returns a new DataFrame. To make changes permanent: df = df.dropna()."
      },
      {
        text: "What does df['avg'].fillna(df['avg'].mean()) do?",
        options: [
          "Removes all rows where avg is NaN",
          "Replaces NaN values in avg with the column's mean",
          "Replaces all values in avg with the mean",
          "Error - fillna requires a fixed constant, not a function call"
        ],
        correctIndex: 1,
        difficulty: "medium",
        feedbackCorrect: "Correct. fillna() replaces NaN values. Passing the column mean is a common imputation strategy.",
        feedbackWrong: "Not quite. fillna(value) replaces NaN cells with value. Passing the column mean replaces missing values with the average."
      },
      {
        text: "Which method removes duplicate rows from a DataFrame?",
        options: ["df.unique()", "df.remove_duplicates()", "df.drop_duplicates()", "df.dedupe()"],
        correctIndex: 2,
        difficulty: "easy",
        feedbackCorrect: "Correct. df.drop_duplicates() returns a DataFrame with duplicate rows removed.",
        feedbackWrong: "Not quite. df.drop_duplicates() is the correct method. .unique() is a Series method for unique values, not a DataFrame method."
      },
      {
        text: "What does df.rename(columns={'old': 'new'}) do?",
        options: [

    // Shuffle and pick 10 questions each attempt
    const questions = allQuestions
      .slice()
      .sort(() => Math.random() - 0.5)
      .slice(0, 10);

        let currentQ = 0;
    let results = [];

    function beginQuiz() {
      document.getElementById('screen-landing').style.display = 'none';
      document.getElementById('screen-question').style.display = 'block';
      renderQuestion();
    }

    function renderQuestion() {
      const q = questions[currentQ];
      const total = questions.length;
      const progressPercent = (currentQ / total) * 100;

      document.getElementById('progressFill').style.width = progressPercent + '%';
      document.getElementById('progressText').textContent = `Question ${currentQ + 1} of ${total}`;
      document.getElementById('questionNumber').textContent = `Question ${currentQ + 1}`;
      document.getElementById('questionText').textContent = q.text;

      const optionsContainer = document.getElementById('optionsContainer');
      optionsContainer.innerHTML = '';

      q.options.forEach((option, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = option;
        btn.onclick = () => selectAnswer(idx);
        optionsContainer.appendChild(btn);
      });

      document.getElementById('feedback').innerHTML = '';
      document.getElementById('feedback').className = 'feedback';
      document.getElementById('nextBtnContainer').classList.remove('show');
    }

    function selectAnswer(optionIndex) {
      const q = questions[currentQ];
      const isCorrect = optionIndex === q.correctIndex;
      results[currentQ] = { correct: isCorrect };

      // Disable all buttons
      document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);

      // Highlight correct and selected options
      document.querySelectorAll('.option-btn').forEach((btn, idx) => {
        if (idx === q.correctIndex) {
          btn.classList.add('correct');
        }
        if (idx === optionIndex && !isCorrect) {
          btn.classList.add('wrong');
        }
      });

      // Show feedback
      const feedbackEl = document.getElementById('feedback');
      feedbackEl.textContent = isCorrect ? q.feedbackCorrect : q.feedbackWrong;
      feedbackEl.className = 'feedback show ' + (isCorrect ? 'correct' : 'wrong');

      // Show next button
      document.getElementById('nextBtnContainer').classList.add('show');
      const nextBtn = document.getElementById('nextBtn');
      if (currentQ === questions.length - 1) {
        nextBtn.textContent = 'See Results →';
      } else {
        nextBtn.textContent = 'Next →';
      }
    }

    function nextQuestion() {
      currentQ++;
      if (currentQ >= questions.length) {
        showResults();
      } else {
        renderQuestion();
      }
    }

    function showResults() {
      document.getElementById('screen-question').style.display = 'none';
      document.getElementById('screen-results').style.display = 'block';

      const score = results.filter(r => r.correct).length;
      const total = results.length;
      const percent = Math.round((score / total) * 100);
      let grade = 'F';
      if (percent >= 90) grade = 'A';
      else if (percent >= 80) grade = 'B';
      else if (percent >= 70) grade = 'C';
      else if (percent >= 60) grade = 'D';

      document.getElementById('scoreNumber').textContent = score + ' / ' + total;
      document.getElementById('scoreDetails').textContent = percent + '% - Grade: ' + grade;

      let breakdownHTML = '<div class="breakdown-title">Question Breakdown</div>';
      results.forEach((result, idx) => {
        const icon = result.correct ? '✓' : '✗';
        const iconClass = result.correct ? 'correct' : 'wrong';
        const correctAnswer = questions[idx].options[questions[idx].correctIndex];
        breakdownHTML += `
          <div class="breakdown-item">
            <div class="breakdown-item-icon ${iconClass}">${icon}</div>
            <div class="breakdown-item-text">
              <strong>Q${idx + 1}:</strong> ${correctAnswer}
            </div>
          </div>
        `;
      });

      document.getElementById('resultsBreakdown').innerHTML = breakdownHTML;

      // Save score to localStorage
      localStorage.setItem('dtsc520_quiz_m4', JSON.stringify({ score, total, percent, grade, completedAt: new Date().toISOString() }));
    }

    function retake() {
      currentQ = 0;
      results = [];
      document.getElementById('screen-results').style.display = 'none';
      document.getElementById('screen-landing').style.display = 'block';
    }
  </script>
