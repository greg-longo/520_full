<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Cabinet Commission - DTSC 520 Capstone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<style>
  :root {
    --bg:#0a0c11; --panel:#11151d; --panel2:#161b25; --line:#272d3a; --line2:#333b4b;
    --ink:#eef1f6; --ink-dim:#a3abbd; --ink-mute:#626c80;
    --brass:#c9a24a; --brass-l:#e3c075; --maroon:#8B1C40; --maroon-l:#c25a7a;
    --on:#5ec99a; --warn:#dab153; --bad:#cf6b7e;
    --serif:'Newsreader',Georgia,serif; --sans:'Zilla Slab',Georgia,serif; --mono:'IBM Plex Mono',monospace;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; }
  body { background:var(--bg); color:var(--ink); font-family:var(--sans); line-height:1.6; overflow:hidden; }
  code { font-family:var(--mono); font-size:0.9em; color:var(--brass-l); }

  /* ===== APP WINDOW FRAME ===== */
  #appwin { position:fixed; inset:0; display:flex; flex-direction:column; }
  .titlebar { display:flex; align-items:center; gap:10px; padding:0.5rem 1rem; background:var(--panel); border-bottom:1px solid var(--line); flex-shrink:0; }
  .tb-dots { display:flex; gap:6px; } .tb-dots i { width:11px; height:11px; border-radius:50%; display:block; }
  .tb-dots i:nth-child(1){background:#e0626d;} .tb-dots i:nth-child(2){background:#dab153;} .tb-dots i:nth-child(3){background:#5ec99a;}
  .tb-title { font-family:var(--mono); font-size:0.74rem; color:var(--ink-dim); letter-spacing:0.03em; }
  .tb-title b { color:var(--ink); font-weight:600; }
  .tb-spacer { flex:1; }
  .tb-home { font-family:var(--mono); font-size:0.68rem; color:var(--ink-mute); text-decoration:none; }
  .tb-home:hover { color:var(--ink-dim); }

  /* ===== MAIN GRID: thread | work | report ===== */
  .grid { flex:1; display:grid; grid-template-columns: 270px 1fr; min-height:0; }
  @media (max-width:1180px){ .grid{ grid-template-columns: 230px 1fr; } }
  @media (max-width:880px){ .grid{ grid-template-columns: 1fr; } .thread{ display:none; } }

  /* Jamie thread (left) */
  .thread { background:var(--panel); border-right:1px solid var(--line); display:flex; flex-direction:column; min-height:0; }
  .thread-head { padding:0.9rem 1rem 0.7rem; border-bottom:1px solid var(--line); display:flex; gap:0.65rem; align-items:center; }
  .avatar { width:42px; height:42px; border-radius:50%; flex-shrink:0; border:1.5px solid var(--brass); }
  /* emotion avatar: a round frame holding either a GIF (img) or the SVG fallback, with crossfade */
  .av { display:inline-block; position:relative; border-radius:50%; flex-shrink:0; border:1.5px solid var(--brass); overflow:hidden; background:#1b2330; }
  .av img, .av svg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  /* No transition on frame swaps - blinks and idle cycling must be instant (frame animation).
     A 0.3s opacity transition here made each blink linger ~0.8s. */
  .av .av-frame.gone { opacity:0; }
  .thread-who { font-weight:600; font-size:0.95rem; }
  .thread-role { font-family:var(--mono); font-size:0.62rem; color:var(--ink-mute); text-transform:uppercase; letter-spacing:0.08em; }
  .thread-msgs { flex:1; overflow-y:auto; padding:1rem 0.9rem; display:flex; flex-direction:column; gap:0.7rem; }
  .msg { background:var(--panel2); border:1px solid var(--line); border-radius:10px 10px 10px 3px; padding:0.6rem 0.8rem; font-size:0.86rem; color:var(--ink-dim); cursor:pointer; transition:border-color 0.15s; }
  .msg:hover { border-color:var(--line2); }
  .msg.fresh { border-color:var(--brass); }
  .msg-text { line-height:1.5; }
  .msg.collapsed .msg-text { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .msg.collapsed .msg-time { display:none; }
  .msg-foot { display:flex; justify-content:space-between; align-items:center; margin-top:0.4rem; }
  .msg-time { font-family:var(--mono); font-size:0.58rem; color:var(--ink-mute); }
  .msg-more { font-family:var(--mono); font-size:0.58rem; color:var(--brass); }
  .msg.collapsed .msg-more::after { content:'more'; }
  .msg:not(.collapsed) .msg-more::after { content:'less'; }

  /* work column */
  .work { display:flex; flex-direction:column; min-height:0; position:relative; }
  .stage-strip { display:flex; gap:0.3rem; padding:0.6rem 1.2rem; border-bottom:1px solid var(--line); background:var(--panel); flex-wrap:wrap; align-items:center; }
  .chip { font-family:var(--mono); font-size:0.6rem; color:var(--ink-mute); padding:2px 8px; border-radius:12px; display:flex; gap:5px; align-items:center; white-space:nowrap; }
  .chip .cd { width:7px; height:7px; border-radius:50%; background:currentColor; opacity:0.5; }
  .chip.active { color:var(--brass); border:1px solid rgba(201,162,74,0.4); } .chip.done { color:var(--on); }
  .chip.active .cd, .chip.done .cd { opacity:1; }
  .strip-spacer { flex:1; }
  .report-toggle { display:none; font-family:var(--mono); font-size:0.62rem; color:var(--brass); background:none; border:1px solid var(--line2); border-radius:5px; padding:3px 9px; cursor:pointer; }
  @media (max-width:1024px){ .grid.has-report .report-toggle{ display:block; } }

  .stage-body { flex:1; overflow-y:auto; padding:2rem 2rem 6rem; }
  .beatwrap { max-width:620px; margin:0 auto; }

  /* ===== BEAT: dialogue ===== */
  /* Start the content near the top (not vertically centered) so the block doesn't
     drift up as the typewriter fills lines. */
  .beat-dialogue { min-height:48vh; display:flex; flex-direction:column; justify-content:flex-start; padding-top:6vh; }
  .speaker { display:flex; gap:0.8rem; align-items:center; margin-bottom:1.1rem; }
  .speaker .avatar { width:48px; height:48px; }
  .speaker-name { font-weight:600; } .speaker-sub { font-family:var(--mono); font-size:0.62rem; color:var(--ink-mute); text-transform:uppercase; letter-spacing:0.08em; }
  .dialogue { font-family:var(--serif); font-size:1.32rem; line-height:1.65; color:var(--ink); min-height:9em; text-align:left; overflow-wrap:break-word; }
  .dialogue .cursor { display:inline-block; width:0.5ch; background:var(--brass); animation:blink 1s step-end infinite; }
  @keyframes blink { 50%{opacity:0;} }

  /* ===== BEAT: interstitial (text only, dark) ===== */
  .beat-interstitial { min-height:60vh; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding-top:7vh; }
  .inter-avatar { margin-bottom:0.9rem; }
  .inter-avatar .av { width:96px; height:96px; border-width:2px; }
  .inter-name { font-family:var(--mono); font-size:0.66rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--brass); margin-bottom:1.1rem; text-align:center; }
  /* Left-aligned so typing grows down/right without re-centering each character. Fixed width = no horizontal jump. */
  .interstitial-text { font-family:var(--serif); font-size:1.42rem; line-height:1.7; color:var(--ink); width:100%; max-width:540px; text-align:left; min-height:8.5em; overflow-wrap:break-word; }

  /* ===== BEAT: decision ===== */
  .d-label { font-family:var(--mono); font-size:0.66rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--maroon-l); margin-bottom:0.5rem; }
  .d-q { font-size:1.18rem; font-weight:600; margin-bottom:1rem; line-height:1.45; }
  .choices { display:flex; flex-direction:column; gap:0.6rem; }
  .choice { text-align:left; background:var(--panel); color:var(--ink); border:1px solid var(--line); border-radius:8px; padding:0.85rem 1rem 0.85rem 2.7rem; position:relative; cursor:pointer; font-family:var(--sans); font-size:0.98rem; line-height:1.5; transition:border-color 0.15s, background 0.15s; }
  .choice:hover:not(:disabled){ border-color:var(--brass); background:var(--panel2); }
  .choice:disabled{ cursor:default; opacity:0.92; }
  .choice .ck { position:absolute; left:0.8rem; top:0.85rem; width:22px; height:22px; border-radius:5px; background:var(--bg); color:var(--ink-mute); font-family:var(--mono); font-size:0.76rem; display:grid; place-items:center; }
  .choice.pick-good{ border-color:var(--on); background:rgba(94,201,154,0.08);} .choice.pick-good .ck{background:rgba(94,201,154,0.22);color:var(--on);}
  .choice.pick-warn{ border-color:var(--warn); background:rgba(218,177,83,0.08);} .choice.pick-warn .ck{background:rgba(218,177,83,0.22);color:var(--warn);}
  .choice.pick-bad{ border-color:var(--bad); background:rgba(207,107,126,0.08);} .choice.pick-bad .ck{background:rgba(207,107,126,0.22);color:var(--bad);}
  .outcome { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:0.9rem 1.1rem; margin-top:1rem; }
  .outcome.good{border-top:3px solid var(--on);} .outcome.warn{border-top:3px solid var(--warn);} .outcome.bad{border-top:3px solid var(--bad);}
  .outcome-t { font-family:var(--mono); font-size:0.8rem; font-weight:600; margin-bottom:0.4rem; }
  .outcome.good .outcome-t{color:var(--on);} .outcome.warn .outcome-t{color:var(--warn);} .outcome.bad .outcome-t{color:var(--bad);}
  .outcome p { font-size:0.92rem; color:var(--ink-dim); }

  /* ===== BEAT: code ===== */
  .lab-task { font-size:0.96rem; color:var(--ink); margin-bottom:0.4rem; }
  .lab-hint-inline { font-size:0.85rem; color:var(--ink-dim); margin-bottom:0.8rem; }
  textarea.editor { width:100%; min-height:170px; resize:vertical; background:#080a0e; color:#e8ecf3; border:1px solid var(--line); border-radius:7px; font-family:var(--mono); font-size:0.84rem; line-height:1.6; padding:0.85rem; tab-size:4; }
  textarea.editor:focus { outline:none; border-color:var(--brass); }
  .lab-btns { display:flex; gap:0.5rem; margin-top:0.7rem; flex-wrap:wrap; }
  .btn { font-family:var(--mono); font-size:0.78rem; font-weight:600; padding:0.55rem 1.2rem; border:none; border-radius:6px; cursor:pointer; }
  .btn-run { background:var(--brass); color:#191205; } .btn-run:disabled{ opacity:0.5; cursor:not-allowed; }
  .btn-ghost { background:transparent; color:var(--ink-dim); border:1px solid var(--line2); }
  .btn-ghost:hover { color:var(--ink); border-color:var(--ink-mute); }
  .console { margin-top:0.7rem; background:#080a0e; border:1px solid var(--line); border-radius:6px; font-family:var(--mono); font-size:0.78rem; padding:0.75rem; min-height:34px; white-space:pre-wrap; color:var(--ink-dim); overflow-x:auto; }
  .console .ok{color:var(--on);} .console .err{color:var(--bad);} .console .sys{color:var(--brass-l);}

  /* continue / nav */
  .beat-nav { display:flex; justify-content:flex-end; align-items:center; gap:1rem; margin-top:1.6rem; }
  .skip-hint { font-family:var(--mono); font-size:0.66rem; color:var(--ink-mute); letter-spacing:0.04em; opacity:0.7; user-select:none; }
  .btn-cont { background:var(--brass); color:#191205; font-family:var(--mono); font-size:0.84rem; font-weight:600; padding:0.7rem 1.7rem; border:none; border-radius:7px; cursor:pointer; }
  .btn-cont:disabled { opacity:0.32; cursor:not-allowed; }
  .btn-cont.ghost { background:transparent; color:var(--ink-dim); border:1px solid var(--line2); }

  /* ===== REPORT PANEL (right, overlay on small) =====
     Hidden until the first finding lands (avoids an empty, misaligned column). */
  .report { display:none; width:300px; background:var(--panel); border-left:1px solid var(--line); flex-direction:column; min-height:0; }
  .grid.has-report .report { display:flex; }
  @media (min-width:1025px){ .grid.has-report{ grid-template-columns:270px 1fr 300px; } }
  @media (max-width:1024px){
    .report { position:fixed; top:var(--shell-h, 0px); right:0; bottom:0; width:320px; max-width:88vw; z-index:60; transform:translateX(100%); transition:transform 0.25s; box-shadow:-12px 0 40px rgba(0,0,0,0.5); }
    .grid.has-report .report { display:flex; transform:translateX(100%); }   /* present but off-screen until toggled */
    .report.open { transform:translateX(0) !important; }
  }
  .report-head { padding:0.9rem 1rem; border-bottom:1px solid var(--line); }
  .report-doc-label { font-family:var(--mono); font-size:0.58rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--brass); }
  .report-title { font-family:var(--serif); font-size:1.05rem; font-weight:500; margin-top:0.15rem; }
  .report-body { flex:1; overflow-y:auto; padding:1rem; font-family:var(--serif); }
  .report-line { font-size:0.9rem; color:var(--ink-dim); padding:0.6rem 0; border-bottom:1px solid var(--line); line-height:1.5; opacity:0; transform:translateY(6px); animation:rin 0.5s forwards; }
  @keyframes rin { to{opacity:1;transform:none;} }
  .report-line b { color:var(--ink); font-weight:500; }
  .report-line .rl-tag { display:block; font-family:var(--mono); font-size:0.58rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--brass); margin-bottom:0.2rem; }

  /* loading */
  #loading { position:fixed; inset:0; background:var(--bg); z-index:200; display:grid; place-items:center; text-align:center; }
  .spin { width:34px; height:34px; border:3px solid var(--line); border-top-color:var(--brass); border-radius:50%; animation:spin 0.9s linear infinite; margin:0 auto 14px; }
  @keyframes spin { to{transform:rotate(360deg);} }
  .load-t { font-family:var(--mono); font-size:0.8rem; color:var(--ink-dim); } .load-s { font-family:var(--mono); font-size:0.66rem; color:var(--ink-mute); margin-top:6px; }

  .fade-in { animation:fadein 0.4s ease; } @keyframes fadein { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:none;} }
  .flash-ok { animation:fok 0.7s ease; } @keyframes fok { 0%,100%{background:#080a0e;} 30%{background:rgba(94,201,154,0.12);} }
  .hidden { display:none !important; }
  a:focus-visible,button:focus-visible,textarea:focus-visible { outline:2px solid var(--brass-l); outline-offset:2px; }
  textarea.editor:focus-visible{ outline:none; }
  @media (prefers-reduced-motion: reduce){ .spin,.flash-ok,.fade-in,.report-line,.dialogue .cursor{ animation:none; opacity:1; transform:none; } }
  ::-webkit-scrollbar{ width:9px; } ::-webkit-scrollbar-thumb{ background:var(--line2); border-radius:5px; }
</style>

<script>
/* ===================== REFINED JUICE ===================== */
(function(){
  const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  let muted=false, actx=null, master=null;
  function ctx(){ if(!actx){ actx=new (window.AudioContext||window.webkitAudioContext)(); master=actx.createGain(); master.gain.value=0.5; const lp=actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=2600; master.connect(lp); lp.connect(actx.destination);} return actx; }
  /* warm tone: triangle/sine, gentle attack + smooth release */
  function note(freq, dur, {type='sine', vol=0.16, when=0, attack=0.012}={}){
    if(muted) return; try{
      const a=ctx(), t=a.currentTime+when;
      const o=a.createOscillator(), g=a.createGain();
      o.type=type; o.frequency.setValueAtTime(freq,t);
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(vol,t+attack);
      g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
      o.connect(g); g.connect(master);
      o.start(t); o.stop(t+dur+0.02);
    }catch(e){}
  }
  window.sfx = {
    key:  ()=>note(660,0.05,{type:'sine',vol:0.02,attack:0.002}),
    /* correct: warm two-note rising "logged" chime */
    pass: ()=>{ note(523.25,0.5,{type:'sine',vol:0.14}); note(783.99,0.6,{type:'triangle',vol:0.10,when:0.1}); },
    /* miss: soft low fall, no buzz */
    fail: ()=>{ note(311.13,0.4,{type:'sine',vol:0.12}); note(233.08,0.55,{type:'sine',vol:0.10,when:0.09}); },
    /* hint: single soft mid tone */
    hint: ()=>note(587.33,0.35,{type:'triangle',vol:0.09}),
    /* finale: warm ascending phrase */
    win:  ()=>{ [523.25,659.25,783.99,1046.5].forEach((f,i)=>note(f,0.7,{type:'sine',vol:0.13,when:i*0.16,attack:0.02})); note(1318.5,0.9,{type:'triangle',vol:0.08,when:0.64}); },
    advance: ()=>note(440,0.18,{type:'sine',vol:0.06,attack:0.004})
  };
  function setMuted(m){ muted=m; const b=document.getElementById('juiceMute'); if(b){b.textContent=muted?'♪̸':'♪'; b.style.textDecoration=muted?'line-through':'none'; b.setAttribute('aria-pressed',String(muted));} try{localStorage.setItem('dtsc520_muted',muted?'1':'0');}catch(e){} }
  window.setMuted=setMuted; document.getElementById('juiceMute').addEventListener('click',()=>setMuted(!muted));
  try{ setMuted(localStorage.getItem('dtsc520_muted')==='1'); }catch(e){}
  /* shorter, tasteful confetti: ~140 frames, fewer pieces, brass/navy */
  window.confettiBurst=function(count=70){
    if(REDUCED) return;
    const cv=document.getElementById('juiceConfetti'); cv.style.display='block'; cv.width=innerWidth; cv.height=innerHeight;
    const ctx2=cv.getContext('2d'); const cols=['#c9a24a','#e3c075','#5ec99a','#8B1C40','#eef1f6'];
    const ps=Array.from({length:count},()=>({x:cv.width*0.5+(Math.random()-0.5)*cv.width*0.5, y:cv.height*0.32, vx:(Math.random()-0.5)*7, vy:-4-Math.random()*7, s:4+Math.random()*5, r:Math.random()*Math.PI, vr:(Math.random()-0.5)*0.3, c:cols[Math.floor(Math.random()*cols.length)], life:1}));
    let fr=0;
    (function d(){ ctx2.clearRect(0,0,cv.width,cv.height);
      ps.forEach(p=>{ p.vy+=0.28; p.x+=p.vx; p.y+=p.vy; p.r+=p.vr; p.life-=0.007; ctx2.globalAlpha=Math.max(0,p.life); ctx2.save(); ctx2.translate(p.x,p.y); ctx2.rotate(p.r); ctx2.fillStyle=p.c; ctx2.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.55); ctx2.restore(); });
      ctx2.globalAlpha=1;
      if(++fr<140) requestAnimationFrame(d); else { ctx2.clearRect(0,0,cv.width,cv.height); cv.style.display='none'; }
    })();
  };
  window.screenShake=function(){ if(REDUCED) return; document.getElementById('beat').animate([{transform:'translate(0,0)'},{transform:'translate(-4px,0)'},{transform:'translate(3px,0)'},{transform:'translate(0,0)'}],{duration:200,easing:'ease-in-out'}); };
})();

/* ===================== JAMIE AVATAR (inline SVG) ===================== */
const JAMIE_SVG = `
<defs><clipPath id="cir"><circle cx="50" cy="50" r="50"/></clipPath></defs>
<g clip-path="url(#cir)">
  <rect width="100" height="100" fill="#1b2330"/>
  <circle cx="50" cy="86" r="34" fill="#2a3344"/>
  <rect x="30" y="70" width="40" height="30" rx="10" fill="#3a4a5e"/>

/* ===================== JAMIE AVATAR — FRAME CYCLING =====================
   Provide STILL frames in capstone/assets/ named:
       jamie-<emotion>-1.png, jamie-<emotion>-2.png, ...   (idle frames; 1+)
       jamie-<emotion>-blink.png                            (optional eyes-closed)
   Emotions: neutral, approve, concern, disappoint, warm.
   The engine probes which files exist and cycles only those:
     - gently cycles idle frames (faster while Jamie is "talking"),
     - blinks occasionally if a -blink frame exists,
     - crossfades when the emotion changes,
     - falls back to the inline SVG if an emotion has no frames at all.
   Everything degrades gracefully: one frame = static; no blink = no blink. */
const EMOTIONS = ['neutral','approve','concern','disappoint','warm'];
const AV = {
  emotion:'neutral', frame:0, talking:false, blinking:false,
  frames:{},            /* emotion -> [src,...] that actually loaded */
  blink:{},             /* emotion -> blink src if it loaded */
  ready:{},             /* emotion -> true once probed */
  timer:null, blinkTimer:null
};
const avSrc = (e,f)=>`assets/jamie-${e}-${f}.png`;

/* Probe up to N idle frames + a blink frame for an emotion; keep the ones that load. */
function probeEmotion(e, maxFrames=6){
  AV.frames[e]=[]; AV.blink[e]=null;
  let pending=maxFrames+1;
  const done=()=>{ if(--pending===0){ AV.ready[e]=true; remountAvatars(); } };
  for(let i=1;i<=maxFrames;i++){
    const img=new Image(); const src=avSrc(e,i);
    img.onload=()=>{ AV.frames[e][i-1]=src; done(); };
    img.onerror=done; img.src=src;
  }
  const b=new Image(); const bsrc=avSrc(e,'blink');
  b.onload=()=>{ AV.blink[e]=bsrc; done(); };
  b.onerror=done; b.src=bsrc;
}
function probeAllEmotions(){ EMOTIONS.forEach(e=>probeEmotion(e)); }

/* Avatar markup: an <img> layer (frames) over the SVG fallback. */
/* Every known frame URL (all emotions' idle frames + blinks), so we can stack them
   ALL as preloaded <img> layers per avatar and just toggle visibility - no src swaps,
   no decode lag, so a blink is exactly as long as we say. */
function allFrameSrcs(){
  const out=[];
  EMOTIONS.forEach(e=>{
    (AV.frames[e]||[]).filter(Boolean).forEach(s=>out.push(s));
    if(AV.blink[e]) out.push(AV.blink[e]);
  });
  return [...new Set(out)];
}
function currentSrc(){
  const fr=(AV.frames[AV.emotion]||[]).filter(Boolean);
  return fr.length ? fr[AV.frame % fr.length] : null;
}
function avatarHTML(size){
  const srcs=allFrameSrcs();
  const active=currentSrc();
  const layers = srcs.map(s=>`<img alt="" class="av-frame${s===active?'':' gone'}" data-src="${s}" src="${s}">`).join('');
  return `<span class="av" style="width:${size}px;height:${size}px;">
    <svg viewBox="0 0 100 100" aria-hidden="true">${JAMIE_SVG}</svg>
    ${layers}
  </span>`;
}
/* Show exactly one stacked layer (by src) instantly; hide the rest. If no frames
   exist yet, hide all and the SVG shows through. */
function paintAvatars(src){
  if(src===undefined) src=currentSrc();
  document.querySelectorAll('.av').forEach(av=>{
    let shown=false;
    av.querySelectorAll('.av-frame').forEach(img=>{
      if(src && img.getAttribute('data-src')===src){ img.classList.remove('gone'); shown=true; }
      else img.classList.add('gone');
    });
    /* If the wanted frame isn't a mounted layer yet (probe race), inject it now so the
       portrait always shows instead of falling back to the SVG. */
    if(src && !shown){
      const img=document.createElement('img');
      img.alt=''; img.className='av-frame'; img.setAttribute('data-src',src); img.src=src;
      av.appendChild(img);
    }
  });
}
/* When new frames finish probing after avatars are on screen, rebuild any mounted
   avatar's stacked layers so the new frames are present & preloaded. */
function remountAvatars(){
  document.querySelectorAll('.av').forEach(av=>{
    const sz=parseInt(av.style.width)||42;
    av.innerHTML=`<svg viewBox="0 0 100 100" aria-hidden="true">${JAMIE_SVG}</svg>`+
      allFrameSrcs().map(s=>`<img alt="" class="av-frame gone" data-src="${s}" src="${s}">`).join('');
  });
  paintAvatars();
}
/* Switch expression. */
function setAvatar(emotion){
  if(!EMOTIONS.includes(emotion)) emotion='neutral';
  AV.emotion=emotion; AV.frame=0;
  paintAvatars();
}
/* Briefly react, then settle back to neutral. */
function reactAvatar(emotion, settleMs=2400){
  setAvatar(emotion);
  clearTimeout(AV.settle);
  AV.settle=setTimeout(()=>setAvatar('neutral'), settleMs);
}
/* Idle/talk cycle: advance idle frame; speed depends on talking. */
function avTick(){
  const fr=(AV.frames[AV.emotion]||[]).filter(Boolean);
  /* Don't repaint mid-blink (would cut the blink short or fight it). */
  if(!AV.blinking && fr.length>1){ AV.frame=(AV.frame+1)%fr.length; paintAvatars(); }
  /* Calmer cadence: a gentle idle drift, slightly livelier (not flickery) while talking. */
  AV.timer=setTimeout(avTick, AV.talking?620:2200);
}
/* Normally-distributed sample (Box-Muller), clamped so blinks never bunch up. */
function gaussMs(meanMs, sdMs, floorMs){
  const u=Math.random()||1e-9, v=Math.random();
  const z=Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
  return Math.max(floorMs, meanMs + z*sdMs);
}
/* Blink: a quick, atomic flash of the blink frame, then back to the current idle frame.
   Marked with AV.blinking so the idle cycle leaves it alone. */
function avBlink(){
  const b=AV.blink[AV.emotion];
  if(b && !AV.blinking){
    AV.blinking=true; paintAvatars(b);
    setTimeout(()=>{ AV.blinking=false; paintAvatars(); }, 110);   /* ~110ms = a natural human blink */
  }
  /* Gap ~ Normal: idle mean 10s (sd 1.5s); a touch more often while speaking. Floor 3s so two never collide. */
  const gap = AV.talking ? gaussMs(7000,1500,2500) : gaussMs(10000,1500,3000);
  AV.blinkTimer=setTimeout(avBlink, gap);
}
function startAvatarLife(){
  if(REDUCED){ paintAvatars(); return; }   /* reduced motion: static frame only */
  clearTimeout(AV.timer); clearTimeout(AV.blinkTimer); AV.blinking=false;
  avTick(); setTimeout(avBlink, 2500);
}
function setTalking(on){ AV.talking=!!on; }

}

/* How well did the student do on a set of decision ids? -> 'good' | 'mixed' | 'bad' */
function decisionVerdict(ids){
  const qs=ids.map(id=>(state.decisions[id]||{}).quality).filter(Boolean);
  if(!qs.length) return 'good';
  if(qs.every(q=>q==='good')) return 'good';
  if(qs.some(q=>q==='bad')) return 'bad';
  return 'mixed';
}
/* Resolve a beat: if it has a dyn(state)->{text,emotion,thread,...}, merge that in. */
function resolveBeat(beat){
  if(beat.type==='dialogue' && typeof beat.dyn==='function'){
    return Object.assign({}, beat, beat.dyn(decisionVerdict));
  }
  return beat;
}

function renderBeat(){
  renderStrip();
  let beat = BEATS[state.beatIndex];
  if(!beat){ location.href='report.html'; return; }
  beat = resolveBeat(beat);
  state.stage = beat.stage ?? state.stage;
  clearBeat();
  /* set Jamie's emotion for this beat (defaults: serious on interstitials, neutral otherwise) */
  setAvatar(beat.emotion || (beat.type==='interstitial' ? 'concern' : 'neutral'));
  if(beat.type==='dialogue') return renderDialogue(beat);
  if(beat.type==='interstitial') return renderInterstitial(beat);
  if(beat.type==='decision') return renderDecision(beat);
  if(beat.type==='code') return renderCode(beat);
  if(beat.type==='note') return renderNote(beat);
}

function typewriter(el, text, done){
  if(REDUCED){ el.textContent=text; done&&done(); return; }
  el.innerHTML=''; let i=0; const cur=document.createElement('span'); cur.className='cursor'; cur.textContent=' ';
  el.appendChild(cur);
  setTalking(true);
  let finished=false;
  function finish(){ if(finished)return; finished=true; el.textContent=text; setTalking(false); window._twSkip=null; done&&done(); }
  window._twSkip=finish;   /* a click in the beat area fast-forwards to the end */
  let last=0;
  function tick(ts){
    if(finished) return;
    if(ts-last > 18){
      last=ts;
      if(i<text.length){ const ch=text[i++]; cur.insertAdjacentText('beforebegin', ch); if(ch!==' ' && Math.random()<0.5){try{window.sfx.key();}catch(e){}} }
      else { cur.remove(); finish(); return; }
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
/* Click anywhere in the beat (not on a button/link) while typing -> skip to full text. */
document.addEventListener('click', function(e){
  if(window._twSkip && e.target.closest('.stage-body') && !e.target.closest('button') && !e.target.closest('a')){

}, true);

window.pickDecision=function(i){

function cline(el,text,cls){ const s=document.createElement('span'); if(cls)s.className=cls; s.textContent=text+'\n'; el.appendChild(s); }
function friendlyError(err){
  const full=(err&&err.message)?err.message:String(err);
  const lines=full.trim().split('\n');
  const last=lines[lines.length-1]||full;
  // Pull the deepest line number from the traceback (the user's code), and any quoted token.
  let lineNum=null; for(const l of lines){ const m=l.match(/line (\d+)/); if(m) lineNum=m[1]; }
  const at = lineNum ? ` (around line ${lineNum})` : '';
  const quoted = (last.match(/'([^']+)'/)||[])[1];

  // AssertionError = our own grading message: surface it verbatim (it's already coaching).
  if(last.startsWith('AssertionError')) return last.replace('AssertionError:','').trim()||'A check failed - re-read what the task asks for.';

  // SyntaxError / IndentationError - point to the line and the most common causes.
  if(last.includes('IndentationError')){
    if(last.includes('expected an indented block')) return `Indentation error${at}: the line after a \`:\` (like def, for, if) must be indented. Add 4 spaces to the body.`;
    if(last.includes('unexpected indent')) return `Indentation error${at}: this line is indented when it shouldn't be. Line up the indentation with the lines around it.`;
    return `Indentation error${at}: check that your spaces are consistent - Python uses 4 spaces per level, no tabs mixed in.`;
  }
  if(last.includes('SyntaxError')){
    if(last.includes('was never closed') || last.includes('EOF')) return `Syntax error${at}: looks like an unclosed bracket, parenthesis, or quote. Check that every \`(\`, \`[\`, and \`"\` has a matching partner.`;
    if(last.includes('invalid syntax')) return `Syntax error${at}: Python couldn't parse this line. Common causes: a missing \`:\` after def/for/if, a stray comma, or = where you meant ==.`;
    return `Syntax error${at}: ${last.replace('SyntaxError:','').trim()}`;
  }

  // NameError - tell them exactly what's undefined and the usual reason.
  if(last.includes('NameError')){
    return `Undefined name${at}: Python doesn't know what \`${quoted||'that'}\` is. Either you haven't created it yet, or it's a typo - check the spelling against where you defined it. (Remember \`df\` is already loaded.)`;
  }

  // KeyError - a column/key that doesn't exist.
  if(last.includes('KeyError')){
    return `No such column or key${at}: \`${quoted||'that name'}\` isn't in the data. Check spelling and capitalization - column names are case-sensitive.`;
  }

  // AttributeError - usually a misspelled method/attribute.
  if(last.includes('AttributeError')){
    const attr=(last.match(/has no attribute '([^']+)'/)||[])[1];
    return `Wrong method or attribute${at}: ${attr?`there's no \`.${attr}\` here`:'that attribute doesn\'t exist'}. Check the spelling - e.g. it's \`.columns\`, not \`.colunms\`.`;
  }

  // TypeError - the famous str+int and not-callable cases.
  if(last.includes('TypeError')){
    if(last.includes('concatenate') || last.includes('unsupported operand')) return `Type mismatch${at}: you're combining incompatible types (e.g. text and a number). Convert first with \`int(...)\`, \`float(...)\`, or \`str(...)\`. Note: the submission_rate column is text like "84%" until it's cleaned.`;
    if(last.includes('not callable')) return `Type error${at}: you used \`()\` on something that isn't a function - check for a name that shadows a built-in, or a missing operator.`;
    if(last.includes('argument')) return `Type error${at}: a function got the wrong number or kind of arguments. Check what it expects.`;
    return `Type error${at}: ${last.replace('TypeError:','').trim()}`;
  }

  // ValueError - common in conversions.
  if(last.includes('ValueError')){
    if(last.includes('could not convert')) return `Conversion error${at}: a value couldn't be converted - e.g. \`float("84%")\` fails because of the \`%\`. Strip non-numeric characters before converting.`;
    return `Value error${at}: ${last.replace('ValueError:','').trim()}`;
  }

  if(last.includes('ZeroDivisionError')) return `Divide-by-zero${at}: you divided by something equal to 0. Check the denominator before dividing.`;
  if(last.includes('IndexError')) return `Index out of range${at}: you asked for a position that doesn't exist (e.g. the 10th item of a 3-item list). Check your indexes.`;
  if(last.includes('IndentationError')) return `Indentation error${at}: check your spacing.`;

  // Fallback - still show the real error, but cleaned up.
  return last.replace(/^\w*Error:\s*/,'').trim() ? `Error${at}: ${last}` : last;
}
async function freshNS(){ const ns=pyodide.globals.get('dict')(); await pyodide.runPythonAsync(COHORT_PY,{globals:ns}); return ns; }
window.runCode=async function(){
  if(!pyodide) return;
  const w=beatEl(), b=w._beat, con=document.getElementById('con'), runBtn=document.getElementById('runBtn');
  con.innerHTML=''; runBtn.disabled=true;
  const src=document.getElementById('ed').value;
  const ns=await freshNS(); let printed='';
  pyodide.setStdout({batched:t=>{printed+=t+'\n';}}); pyodide.setStderr({batched:t=>{printed+=t+'\n';}});
  try{ await pyodide.runPythonAsync(src,{globals:ns}); }
  catch(err){ if(printed.trim())cline(con,printed.trimEnd()); cline(con,'✗ '+friendlyError(err),'err'); try{window.sfx.fail();window.screenShake();}catch(e){} ns.destroy(); runBtn.disabled=false; return; }
  if(printed.trim())cline(con,printed.trimEnd());
  try{ await pyodide.runPythonAsync(b.test,{globals:ns}); }
  catch(err){ cline(con,'✗ Not quite: '+friendlyError(err),'err'); try{window.sfx.fail();window.screenShake();}catch(e){} ns.destroy(); runBtn.disabled=false; return; }
  ns.destroy();
  cline(con,'✔ Checks passed.','ok');
  document.getElementById('ed').classList.add('flash-ok'); setTimeout(()=>document.getElementById('ed').classList.remove('flash-ok'),700);
  if(!w._passed){ w._passed=true; state.codePassed[b.id]=true; try{window.sfx.pass();window.confettiBurst(48);}catch(e){} reactAvatar('approve'); if(b.onPass)b.onPass(); }
  document.getElementById('contBtn').disabled=false; runBtn.disabled=false;
  saveProgress();
};

/* ===================== STAGE CONTENT ===================== */
function buildBeats(){
  const B=[];

`r = profile_cohort(df)

exp_n = 102
exp_aid = int((df['need_based_aid'] == 1).sum())
exp_pct = round(100 * exp_aid / exp_n, 1)
assert r[0] == exp_n, "n_records should be 102 - the raw extract still includes its duplicate rows (we clean later)."
assert r[1] == exp_aid, "n_on_aid should count students with need_based_aid == 1."
assert r[2] == exp_pct, "pct_on_aid should be 100*n_on_aid/n_records rounded to 1 decimal."`,
    solutionNote:'n_records = len(table). Loop: for v in table["need_based_aid"]: if v == 1: n_on_aid += 1. Then pct_on_aid = round(100 * n_on_aid / n_records, 1).',
    onPass:()=>{ addReportLine('Cohort','Sample: <b>102 records</b> (incl. duplicates to be cleaned), 14 fields spanning HS → undergrad → work → LMS.'); }
  });

  B.push({stage:1, type:'decision', id:'s2_smell', pts:4,
    label:'Decision · First read',
    intro:'Your profile ran. 102 records - but the cohort was described as ~100 students, and the submission-rate column came back as text like <code>"84%"</code>, with some blanks.',
    q:'What do these signs tell you, and what\'s the right next move?',
    onPick:(c)=>{ if(c.q==='good') addReportLine('Data quality','Flagged before cleaning: duplicate rows, a percent-string column, and missing values concentrated in engagement fields.'); },
    choices:[
      { t:'Duplicates and a string-typed column and blanks are exactly the issues to fix in the dedicated cleaning step - note them and move on to clean deliberately.', q:'good',
        ot:'✓ Right read, right restraint', op:'Two extra rows = the duplicates you expected. A "84%" string means the column is text, not numeric. Blanks mean missing values. These are precisely what the cleaning stage handles - you note them now and fix them deliberately, not reactively.' },
      { t:'The data is corrupted and untrustworthy - flag it back to the source team and pause the analysis until they send a clean export.', q:'bad',
        ot:'✗ This is normal, not corruption', op:'Real extracts always arrive with duplicates, type quirks, and gaps. Bouncing it back stalls the project over routine cleaning that\'s literally your job. Note the issues; handle them at the cleaning step.' },
      { t:'Quickly strip the "%", convert to float, and drop duplicate rows now so the data\'s clean before you forget.', q:'warn',
        ot:'~ Right fixes, wrong moment', op:'Those are the correct operations - but doing them ad hoc, here, scattered through the workflow, is how steps get missed and decisions go undocumented. Cleaning is its own stage for a reason. Catalog the issues now; execute them together.' },
      { t:'The blanks are probably random, so plan to drop any row with a missing value to keep the dataset complete.', q:'bad',
        ot:'✗ Dangerous assumption', op:'Never assume missingness is random before checking. Here it isn\'t - engagement records go missing more often for struggling students, so dropping those rows would bias the very finding you\'re after. You\'ll confront this directly at the cleaning stage.' },
    ]});

  B.push({stage:1, type:'dialogue', thread:true, time:'9:36 AM', cont:'Stage 3: Compute the metrics →',
    text:"Now you know what you're holding. Next we turn raw fields into metrics.",  /* fallback */
    dyn:(verdict)=>{
      const v=verdict(['s2_smell']);
      if(v==='good') return { emotion:'approve',
        text:"Good - you knew what you're holding and what's wrong with it, and you didn't panic or paper over it. That instinct to catalog problems instead of hiding them is the whole job. Now we turn raw fields into the metrics that actually answer the Cabinet's question." };
      if(v==='mixed') return { emotion:'concern',
        text:"Close. You spotted the issues, but the move you reached for would've scattered the cleaning across the workflow - that's how steps get missed and nobody can reproduce your numbers later. Keep cleaning as its own deliberate step. Onward." };
      return { emotion:'disappoint',
        text:"No. Read that back. You were one click from either bouncing routine data back to the source - stalling the whole project - or dropping rows whose missingness isn't random, which would bias the exact finding we're chasing. This is precisely the carelessness that produces confident, wrong reports. Slow down. The numbers we build next are only as honest as how we handle this." };
    }});

  return B;
}

/* ===================== BOOT ===================== */
async function boot(){
  probeAllEmotions();   /* discover which avatar frames exist */
  buildAvatars();
  startAvatarLife();    /* blink + idle/talk cycle (no-op visually until frames load) */
  try{
    pyodide = await loadPyodide({ indexURL:'https://cdn.jsdelivr.net/pyodide/v0.26.4/full/' });
    document.getElementById('loadText').textContent='Loading pandas...';
    await pyodide.loadPackage(['pandas','numpy']);
    BEATS = buildBeats();
    state.maxPoints = BEATS.filter(b=>b.type==='decision').reduce((s,b)=>s+(b.pts||4),0);
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('appwin').classList.remove('hidden');
    renderBeat();
  }catch(e){
    document.getElementById('loadSpin').style.display='none';
    document.getElementById('loadText').textContent='Could not load the environment. Please refresh.';
  }
}
boot();
